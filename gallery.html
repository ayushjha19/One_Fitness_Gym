<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gallery | One Life Fitness Gym</title>

    <link rel="icon" href="images/logo.png">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div class="container nav-container">

            <a href="index.html" class="logo">

                <img src="images/logo.png"
                    alt="Gym Logo">

                <span>One Life Fitness Gym</span>

            </a>

            <nav class="navbar">

                <ul class="nav-links">

                    <li>
                        <a href="index.html">
                            Home
                        </a>
                    </li>

                    <li>
                        <a href="index.html#programs">
                            Programs
                        </a>
                    </li>

                    <li>
                        <a href="index.html#plans">
                            Plans
                        </a>
                    </li>

                    <li>
                        <a href="gallery.html">
                            Gallery
                        </a>
                    </li>

                    <li>
                        <a href="index.html#contact">
                            Contact
                        </a>
                    </li>

                </ul>

            </nav>

        </div>

    </header>

    <!-- GALLERY HERO -->

    <section class="gallery-hero">

        <div class="container">

            <h1>
                OUR GALLERY
            </h1>

            <p>
                Explore our facilities, events,
                equipment and workout environment.
            </p>

        </div>

    </section>

    <!-- GALLERY GRID -->

    <section class="gallery-section">

        <div class="container">

            <div class="gallery-grid">

                <div class="gallery-item">
                    <img src="images/gallery/gym1.jpg" alt="">
                </div>

                <div class="gallery-item">
                    <img src="images/gallery/gym2.jpg" alt="">
                </div>

                <div class="gallery-item">
                    <img src="images/gallery/gym3.jpg" alt="">
                </div>

                <div class="gallery-item">
                    <img src="images/gallery/gym4.jpg" alt="">
                </div>

                <div class="gallery-item">
                    <img src="images/gallery/gym5.jpg" alt="">
                </div>

                <div class="gallery-item">
                    <img src="images/gallery/gym6.jpg" alt="">
                </div>

                <div class="gallery-item">
                    <img src="images/gallery/gym7.jpg" alt="">
                </div>

                <div class="gallery-item">
                    <img src="images/gallery/gym8.jpg" alt="">
                </div>

                <div class="gallery-item">
                    <img src="images/gallery/gym9.jpg" alt="">
                </div>

            </div>

        </div>

    </section>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="container">

            <h3>One Life Fitness Gym</h3>

            <p>
                Train Hard. Stay Strong.
            </p>

            <div class="social-icons">

                <a href="#">
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a href="#">
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="#">
                    <i class="fab fa-youtube"></i>
                </a>

            </div>

            <p class="copyright">
                © 2026 One Life Fitness Gym.
                All Rights Reserved.
            </p>

        </div>

    </footer>

    <!-- LIGHTBOX -->

    <div class="lightbox" id="lightbox">

        <span class="close-lightbox">
            &times;
        </span>

        <img
            id="lightbox-image"
            src=""
            alt="Gallery Image">

    </div>
    
    <script src="js/gallery.js"></script>

    <script src="js/script.js"></script>
</body>

</html>
